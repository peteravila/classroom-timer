<!-- public/student.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Class Timer</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  :root { --green:#4ecca3; --yellow:#f0c24b; --orange:#e67e22; --red:#e74c3c; --blue:#3498db; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px 20px;
    transition: background 0.8s;
  }

  /* Background color states */
  body.state-idle    { background: #1a1a2e; color: #e0e0e0; }
  body.state-green   { background: #0d3b2e; color: #e0e0e0; }
  body.state-yellow  { background: #332b00; color: #e0e0e0; }
  body.state-orange  { background: #3b2010; color: #e0e0e0; }
  body.state-red     { background: #3b1010; color: #e0e0e0; }
  body.paused { color: #444; }
  body.state-done    { background: #4a0e0e; color: #e0e0e0; }

  /* Transparent mode — for OBS/display only */
  body.mode-transparent { background: transparent !important; }

  /* Clock-only mode — hide everything except digits */
  body.mode-clock-only .course-title,
  body.mode-clock-only .progress-ring,
  body.mode-clock-only .label,
  body.mode-clock-only .end-time,
  body.mode-clock-only .message,
  body.mode-clock-only .done-banner,
  body.mode-clock-only .status-badge,
  body.mode-clock-only .qr-corner { display: none !important; }

  .label {
    font-size: min(4.4rem, 9vh); font-weight: 700; text-align: center;
    min-height: 1.2em; margin-bottom: 10px; opacity: 0.95;
    white-space: pre-line; max-width: min(460px, 90vw);
    max-height: min(22vh, 12rem); overflow: hidden;
  }

  .digits {
    font-size: min(28vw, 15vh, 8rem); font-weight: 800;
    font-variant-numeric: tabular-nums; letter-spacing: 3px;
    line-height: 1; margin: 10px 0;
    transition: color 0.5s, font-size 0.3s;
  }
  .digits.has-hours {
    font-size: min(22vw, 13vh, 7rem);
  }
  .state-green .digits  { color: var(--green); }
  .state-yellow .digits { color: var(--yellow); }
  .state-orange .digits { color: var(--orange); }
  .state-done .digits   { color: var(--red); animation: pulse 1s infinite; }
  .paused .digits { color: #444; }
  .state-idle .digits   { color: #556; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .end-time {
    font-size: min(1.6rem, 3vh); margin-top: 4px; min-height: 1.4em;
  }
  .state-green .end-time  { color: var(--green); }
  .state-yellow .end-time { color: var(--yellow); }
  .state-orange .end-time { color: var(--orange); }
  .state-done .end-time   { color: var(--red); }
  .paused .end-time { color: #444; }
  .state-idle .end-time   { color: #556; }

  /* All text follows digit color through state transitions */
  .state-green .label,  .state-green .course-title  { color: var(--green); }
  .state-yellow .label, .state-yellow .course-title  { color: var(--yellow); }
  .state-orange .label, .state-orange .course-title  { color: var(--orange); }
  .state-done .label,   .state-done .course-title    { color: var(--red); }
  .paused .label, .paused .course-title  { color: #444; }
  .state-idle .label,   .state-idle .course-title    { color: #e0e0e0; }

  .state-green .message  { color: var(--green); }
  .state-yellow .message { color: var(--yellow); }
  .state-orange .message { color: var(--orange); }
  .state-done .message   { color: var(--red); }
  .paused .message { color: #444; }
  .state-idle .message   { color: #bbb; }


  .message {
    font-size: min(3.2rem, 6.4vh); color: #bbb; text-align: center;
    max-width: min(460px, 90vw); line-height: 1.5; margin-top: 20px;
    min-height: 1.5em; white-space: pre-line;
    max-height: min(22vh, 12rem); overflow: hidden;
  }

  .status-badge {
    margin-top: 24px; font-size: 0.8rem; text-transform: uppercase;
    letter-spacing: 2px; opacity: 0.5;
  }

  /* Course title — big banner above the ring */
  .course-title {
    font-size: clamp(3.6rem, min(11vw, 11vh), 6.4rem); font-weight: 700;
    text-align: center; color: rgba(255,255,255,0.85);
    max-width: min(460px, 90vw); line-height: 1.2; margin-bottom: 12px;
    min-height: 0; white-space: pre-line;
    max-height: min(18vh, 10rem); overflow: hidden;
  }
  .course-title:empty { display: none; }

  /* Progress ring — scales with viewport height on large screens */
  .progress-ring { margin-bottom: 6px; width: min(180px, 25vh); height: min(180px, 25vh); }
  .progress-bg { stroke: rgba(255,255,255,0.08); }
  .progress-fg { transition: stroke-dashoffset 0.3s linear, stroke 0.5s; stroke-linecap: round; }

  .done-banner {
    display: none; font-size: 1.3rem; font-weight: 700;
    color: var(--red); margin-top: 16px; text-align: center;
    animation: pulse 1s infinite;
  }
  body.state-done .done-banner { display: block; }

  /* QR code — large screens only (Zoom share), hidden on phones */
  .qr-corner {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    text-align: center;
  }
  @media (min-width: 800px) {
    .qr-corner { display: block; }
  }
  .qr-corner .qr-scan-label {
    font-size: 0.95rem;
    color: rgba(255,255,255,0.55);
    margin-bottom: 8px;
    max-width: 220px;
    line-height: 1.3;
  }
  .qr-corner img {
    border-radius: 8px;
    background: #fff;
    padding: 4px;
  }
  .qr-corner .qr-class-code {
    font-size: 1.6rem; font-weight: 800; letter-spacing: 4px;
    color: rgba(255,255,255,0.7); font-family: monospace;
    margin-top: 8px;
  }
  .qr-corner .qr-hint {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.4);
    margin-top: 6px;
    max-width: 220px;
    line-height: 1.4;
  }

  /* Code entry gate */
  .code-gate {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 16px;
  }
  .code-gate h2 { font-size: 1.6rem; font-weight: 600; color: #e0e0e0; }
  .code-gate p { font-size: 1rem; color: #888; max-width: 300px; }
  .code-gate input {
    font-size: 2rem; font-weight: 700; text-align: center; letter-spacing: 6px;
    width: 200px; padding: 10px; border: 2px solid #333; border-radius: 8px;
    background: #16213e; color: #e0e0e0; text-transform: uppercase;
    font-family: inherit;
  }
  .code-gate input:focus { outline: none; border-color: var(--blue); }
  .code-gate .code-btn {
    font-size: 1rem; padding: 10px 32px; border: none; border-radius: 6px;
    background: var(--blue); color: #fff; cursor: pointer; font-weight: 600;
  }
  .code-gate .code-btn:hover { opacity: 0.9; }
  .code-gate .code-error {
    color: var(--red); font-size: 0.9rem; min-height: 1.2em;
  }

  /* Timer content — hidden on phones until code is validated */
  .timer-content { display: none; }
  .timer-content.visible {
    display: flex; flex-direction: column; align-items: center;
  }

  /* Student tabs (Timer | Check In) — phones only */
  .student-tabs {
    display: none; width: 100%; max-width: 400px; margin-bottom: 16px;
  }
  .student-tabs.visible { display: flex; }
  .student-tab-bar {
    display: flex; width: 100%; border-bottom: 2px solid rgba(255,255,255,0.1);
    margin-bottom: 0;
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: inherit; padding-top: env(safe-area-inset-top, 0);
  }
  /* Push content below the fixed tab bar */
  .student-tabs.visible ~ .timer-content,
  .student-tabs.visible ~ .checkin-content {
    margin-top: 46px;
  }
  .student-tab-btn {
    flex: 1; padding: 10px 6px; border: none; background: transparent;
    color: #666; font-size: 0.9rem; font-weight: 600; font-family: inherit;
    cursor: pointer; border-bottom: 3px solid transparent;
    margin-bottom: -2px; transition: all 0.2s;
  }
  .student-tab-btn:hover { color: #aaa; }
  .student-tab-btn.active { color: var(--green); border-bottom-color: var(--green); }

  /* Check In tab content */
  .checkin-content { display: none; }
  .checkin-content.visible {
    display: flex; flex-direction: column; align-items: center;
    padding: 16px 20px; text-align: center; gap: 16px; width: 100%;
  }

  /* Mini timer at top of Check In tab */
  .checkin-mini-timer {
    display: flex; flex-direction: column; align-items: center;
    gap: 2px; margin-bottom: 8px;
  }
  .checkin-mini-label {
    font-size: 0.85rem; font-weight: 600; opacity: 0.8;
  }
  .checkin-mini-digits {
    font-size: min(20vw, 12vh, 6rem); font-weight: 800; font-variant-numeric: tabular-nums;
    letter-spacing: 3px; line-height: 1; transition: color 0.5s;
  }
  .checkin-mini-digits.has-hours { font-size: min(16vw, 10vh, 5rem); }
  .checkin-mini-idle { color: #556; }

  .checkin-status {
    font-size: 1.1rem; color: #888; text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* Editable name — tap to edit */
  .checkin-name {
    font-size: 1.4rem; font-weight: 700; color: #e0e0e0;
    cursor: pointer; padding: 4px 12px;
    border: 1px dashed transparent; border-radius: 6px;
    transition: border-color 0.2s;
  }
  .checkin-name:hover { border-color: rgba(255,255,255,0.2); }
  .checkin-name-hint {
    font-size: 0.7rem; color: #444; margin-top: -8px;
  }
  .checkin-name-edit {
    display: flex; align-items: center; gap: 8px;
  }
  .checkin-name-input {
    font-size: 1.4rem; font-weight: 700; text-align: center;
    background: rgba(52,152,219,0.08); color: #e0e0e0;
    border: 1px solid var(--blue); border-radius: 6px;
    padding: 4px 12px; font-family: inherit; outline: none;
    width: 180px;
  }
  .checkin-name-ok {
    padding: 6px 14px; border: 2px solid var(--blue); border-radius: 6px;
    background: var(--blue); color: #fff; font-size: 0.9rem;
    font-weight: 700; font-family: inherit; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .checkin-name-ok:hover { opacity: 0.85; }

  .checkin-buttons { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  .checkin-btn {
    padding: 16px 36px; border-radius: 12px; font-size: 1.1rem;
    font-weight: 700; font-family: inherit; cursor: pointer;
    transition: all 0.2s; border: 2px solid transparent;
    min-width: 140px;
  }
  .checkin-btn-working {
    background: rgba(52,152,219,0.15); color: var(--blue);
    border-color: var(--blue);
  }
  .checkin-btn-working:hover { background: rgba(52,152,219,0.25); }
  .checkin-btn-working.active {
    background: var(--blue); color: #fff;
  }
  .checkin-btn-done {
    background: rgba(78,204,163,0.15); color: var(--green);
    border-color: var(--green);
  }
  .checkin-btn-done:hover { background: rgba(78,204,163,0.25); }
  .checkin-btn-done.active {
    background: var(--green); color: #1a1a2e;
  }
  .checkin-btn-idle {
    background: rgba(255,255,255,0.05); color: #666;
    border-color: #555;
  }
  .checkin-btn-idle:hover { background: rgba(255,255,255,0.1); }
  .checkin-btn-idle.active {
    background: #444; color: #e0e0e0;
  }
  .checkin-hint {
    font-size: 0.8rem; color: #555; max-width: 300px; line-height: 1.4;
  }

  /* Name input on code gate */
  .code-gate .name-input {
    font-size: 1.1rem; text-align: center; width: 240px; padding: 8px;
    border: 2px solid #333; border-radius: 8px;
    background: #16213e; color: #e0e0e0; font-family: inherit;
  }
  .code-gate .name-input:focus { outline: none; border-color: var(--blue); }
  .code-gate .name-label { font-size: 0.85rem; color: #666; }

  /* Large screens: always show timer, hide code gate, hide student tabs */
  @media (min-width: 800px) {
    .code-gate { display: none !important; }
    .student-tabs { display: none !important; }
    .timer-content {
      display: flex !important; flex-direction: column; align-items: center;
    }
  }
</style>
</head>
<body class="state-idle">

<!-- Code entry gate (shown until valid code is provided) -->
<div class="code-gate" id="codeGate">
  <h2>Enter Class Code</h2>
  <p>Ask your instructor for the 4-character code, or scan the QR code from the main screen.</p>
  <input type="text" id="codeInput" maxlength="4" placeholder="----" autocomplete="off">
  <div class="name-label">Your name (optional)</div>
  <input type="text" id="nameInput" class="name-input" placeholder="e.g. Alex" autocomplete="off" maxlength="30">
  <button class="code-btn" id="codeBtn" onclick="submitCode()">Join</button>
  <div class="code-error" id="codeError"></div>
</div>

<!-- Student tabs: Timer | Check In (phones only, after validation) -->
<div class="student-tabs" id="studentTabs">
  <div class="student-tab-bar">
    <button class="student-tab-btn active" id="tabBtnTimer" onclick="switchStudentTab('timer')">Timer</button>
    <button class="student-tab-btn" id="tabBtnCheckin" onclick="switchStudentTab('checkin')">Check In</button>
  </div>
</div>

<!-- Timer content (hidden until code is validated) -->
<div class="timer-content" id="timerContent">
  <div class="course-title" id="courseTitle"></div>

  <svg class="progress-ring" width="180" height="180" viewBox="0 0 180 180">
    <circle class="progress-bg" cx="90" cy="90" r="80"
            fill="none" stroke-width="7" />
    <circle class="progress-fg" id="progressRing" cx="90" cy="90" r="80"
            fill="none" stroke-width="7" stroke="var(--green)"
            stroke-dasharray="502.65" stroke-dashoffset="0"
            transform="rotate(-90 90 90)" />
  </svg>

  <div class="label" id="label"></div>
  <div class="digits" id="digits">00:00</div>
  <div class="end-time" id="endTime"></div>
  <div class="message" id="message"></div>
  <div class="done-banner" id="doneBanner">Time's Up!</div>
  <div class="status-badge" id="statusBadge">No timer set</div>
</div>

<!-- QR code — always visible on large screens (outside timerContent so it shows on code gate too) -->
<div class="qr-corner" id="qrCorner">
  <div class="qr-scan-label">Scan to view this timer on your phone</div>
  <div id="qrImg"></div>
  <div class="qr-hint" id="qrHint"></div>
  <div class="qr-class-code" id="qrClassCode"></div>
</div>

<!-- Check In tab content (phones only) -->
<div class="checkin-content" id="checkinContent">
  <div class="checkin-mini-timer">
    <div class="checkin-mini-label" id="checkinMiniLabel"></div>
    <div class="checkin-mini-digits checkin-mini-idle" id="checkinMiniDigits">00:00</div>
  </div>
  <div class="checkin-name" id="checkinName" onclick="editCheckinName()" title="Tap to change your name"></div>
  <div class="checkin-name-hint">tap name to edit</div>
  <div class="checkin-status" id="checkinStatus">Tap a button to check in</div>
  <div class="checkin-buttons">
    <button class="checkin-btn checkin-btn-working" id="btnWorking" onclick="setCheckinState('working')">Working on it</button>
    <button class="checkin-btn checkin-btn-done" id="btnDone" onclick="setCheckinState('done')">Done</button>
    <button class="checkin-btn checkin-btn-idle" id="btnIdle" onclick="setCheckinState('idle')">No Status</button>
  </div>
  <div class="checkin-hint">Let your instructor know your progress.</div>
</div>

<script>
const socket = io();
const CIRCUMFERENCE = 2 * Math.PI * 80; // 502.65
const params = new URLSearchParams(window.location.search);
const isPreview = params.has('preview');
const isOBS = params.has('obs');
const urlCode = params.get('code');
const urlTransparent = params.get('transparent') === 'true';
const urlClockOnly = params.get('clockonly') === 'true';

const isLargeScreen = window.innerWidth >= 800;
const isDisplayViewer = isPreview || isOBS || isLargeScreen;

// ── Persistent student identity ──
function getStudentId() {
  let id = localStorage.getItem('studentUUID');
  if (!id) {
    id = crypto.randomUUID ? crypto.randomUUID() :
         'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
           const r = Math.random() * 16 | 0;
           return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
         });
    localStorage.setItem('studentUUID', id);
  }
  return id;
}
function getStudentName() {
  return localStorage.getItem('studentName') || '';
}
function setStudentName(name) {
  if (name) localStorage.setItem('studentName', name);
}

const studentId = getStudentId();
let myCheckinState = 'idle'; // idle | working | done
let myDisplayName = getStudentName();

// ── Student tab switching ──
let activeStudentTab = 'timer';

function switchStudentTab(tab) {
  activeStudentTab = tab;
  document.getElementById('tabBtnTimer').classList.toggle('active', tab === 'timer');
  document.getElementById('tabBtnCheckin').classList.toggle('active', tab === 'checkin');
  document.getElementById('timerContent').classList.toggle('visible', tab === 'timer');
  document.getElementById('checkinContent').classList.toggle('visible', tab === 'checkin');
}

function setCheckinState(state) {
  if (state === myCheckinState) return; // already in this state, do nothing
  myCheckinState = state;
  socket.emit('student-status', { state });
  updateCheckinUI();
}

function updateCheckinUI() {
  const btnW = document.getElementById('btnWorking');
  const btnD = document.getElementById('btnDone');
  const btnI = document.getElementById('btnIdle');
  const statusEl = document.getElementById('checkinStatus');

  btnW.classList.toggle('active', myCheckinState === 'working');
  btnD.classList.toggle('active', myCheckinState === 'done');
  btnI.classList.toggle('active', myCheckinState === 'idle');

  if (myCheckinState === 'working') statusEl.textContent = 'Working on it...';
  else if (myCheckinState === 'done') statusEl.textContent = 'Done!';
  else statusEl.textContent = 'Tap a button to check in';
}

// ── Mini timer on Check In tab ──
function updateCheckinMiniTimer(s) {
  const digitsEl = document.getElementById('checkinMiniDigits');
  const labelEl = document.getElementById('checkinMiniLabel');
  if (!digitsEl) return;

  digitsEl.textContent = fmt(s.remainingSeconds);
  const hasHours = Math.abs(s.remainingSeconds) >= 3600;
  digitsEl.classList.toggle('has-hours', hasHours);

  // Show the timer label if there is one
  labelEl.textContent = s.label || '';

  // Color the digits to match the timer state
  const refTotal = s.originalTotal || s.totalSeconds;
  const { cls } = stateClass(s.remainingSeconds, refTotal, s.running);
  digitsEl.className = 'checkin-mini-digits';
  if (hasHours) digitsEl.classList.add('has-hours');
  if (cls === 'state-green') digitsEl.style.color = 'var(--green)';
  else if (cls === 'state-yellow') digitsEl.style.color = 'var(--yellow)';
  else if (cls === 'state-orange') digitsEl.style.color = 'var(--orange)';
  else if (cls === 'state-done') digitsEl.style.color = 'var(--red)';
  else digitsEl.style.color = '#556';
}

// ── Editable name ──
function editCheckinName() {
  const nameEl = document.getElementById('checkinName');
  const hintEl = document.querySelector('.checkin-name-hint');
  const currentName = nameEl.textContent;

  // Build the edit row: input + OK button
  const wrap = document.createElement('div');
  wrap.className = 'checkin-name-edit';

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'checkin-name-input';
  input.value = currentName;
  input.maxLength = 30;
  input.placeholder = 'Your name';

  const okBtn = document.createElement('button');
  okBtn.className = 'checkin-name-ok';
  okBtn.textContent = 'OK';

  wrap.appendChild(input);
  wrap.appendChild(okBtn);

  nameEl.style.display = 'none';
  if (hintEl) hintEl.style.display = 'none';
  nameEl.parentNode.insertBefore(wrap, nameEl.nextSibling);
  input.focus();
  input.select();

  let committed = false;
  function commit() {
    if (committed) return;
    committed = true;
    const newName = input.value.trim();
    wrap.remove();
    nameEl.style.display = '';
    if (hintEl) hintEl.style.display = '';
    if (newName && newName !== currentName) {
      myDisplayName = newName;
      setStudentName(newName);
      nameEl.textContent = newName;
      // Tell server about the name change
      socket.emit('student-identify', { id: studentId, name: newName });
    }
  }

  okBtn.addEventListener('click', (e) => { e.stopPropagation(); commit(); });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { input.value = currentName; commit(); }
  });
}

// Track whether student has been validated (survives reconnects)
let studentValidated = false;
let codeExpired = false;  // true after disconnect-all; suppresses auto-retry with stale urlCode

if (isPreview) {
  document.getElementById('codeGate').style.display = 'none';
  document.getElementById('timerContent').classList.add('visible');
  document.getElementById('qrCorner').style.display = 'none';
  document.documentElement.style.overflow = 'hidden';
  document.body.style.overflow = 'hidden';
} else if (isOBS) {
  // OBS browser source — skip code gate, hide QR, show timer
  document.getElementById('codeGate').style.display = 'none';
  document.getElementById('timerContent').classList.add('visible');
  document.getElementById('qrCorner').style.display = 'none';
} else if (!urlCode && !isLargeScreen) {
  // Phone without code — show code entry gate
  const savedName = getStudentName();
  if (savedName) document.getElementById('nameInput').value = savedName;
  document.getElementById('codeInput').focus();
}

// Re-identify on every connect/reconnect so the server knows our role
socket.on('connect', () => {
  if (isPreview) {
    socket.emit('identify', 'preview');
  } else if (isOBS) {
    socket.emit('identify', 'display');
  } else if (studentValidated) {
    // Already validated — re-validate with the code we used
    socket.emit('validate-code', studentValidated);
    // Note: student-identify is sent in code-accepted handler after re-validation
  } else if (urlCode && !codeExpired) {
    // First connect with QR code — auto-validate (skip if code was expired by disconnect-all)
    socket.emit('validate-code', urlCode.toUpperCase());
  } else if (isLargeScreen) {
    socket.emit('identify', 'display');
  }
});

function submitCode() {
  const errEl = document.getElementById('codeError');
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  if (code.length < 4) {
    errEl.textContent = 'Please enter a 4-character code.';
    return;
  }
  if (!socket.connected) {
    errEl.textContent = 'Reconnecting...';
    socket.connect();
    // Wait for connection, then auto-retry
    socket.once('connect', () => {
      errEl.textContent = '';
      socket.emit('validate-code', code);
    });
    return;
  }
  errEl.textContent = 'Validating...';
  socket.emit('validate-code', code);
  // If no response within 3 seconds, show a diagnostic message
  setTimeout(() => {
    if (errEl.textContent === 'Validating...') {
      errEl.textContent = 'No response from server. Connected: ' + socket.connected + ', ID: ' + socket.id;
    }
  }, 3000);
}

// Allow Enter key to submit code
document.getElementById('codeInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') submitCode();
});

socket.on('code-accepted', () => {
  // Remember the code so we can re-validate on reconnect
  codeExpired = false;
  studentValidated = document.getElementById('codeInput').value.trim().toUpperCase() || (urlCode ? urlCode.toUpperCase() : '');
  document.getElementById('codeGate').style.display = 'none';

  // Show student tabs on phones (not display viewers)
  if (!isDisplayViewer) {
    document.getElementById('studentTabs').classList.add('visible');
    switchStudentTab('timer'); // this also makes timerContent visible
  } else {
    document.getElementById('timerContent').classList.add('visible');
  }

  // Capture name from input (if provided) and save
  const nameVal = (document.getElementById('nameInput').value || '').trim();
  if (nameVal) {
    setStudentName(nameVal);
    myDisplayName = nameVal;
  }

  // Identify to server with persistent UUID and optional name
  socket.emit('student-identify', { id: studentId, name: myDisplayName || '' });

  // Restore check-in state
  updateCheckinUI();
  document.getElementById('checkinName').textContent = myDisplayName || '';
});

socket.on('code-rejected', () => {
  document.getElementById('codeError').textContent = 'Invalid code. Please try again.';
  // Ensure gate is visible (may have been hidden on QR-code arrival)
  document.getElementById('codeGate').style.display = 'flex';
});

socket.on('code-expired', () => {
  // Class code was changed — clear old validation so reconnect doesn't retry stale code
  studentValidated = false;
  codeExpired = true;
  document.getElementById('timerContent').classList.remove('visible');
  document.getElementById('checkinContent').classList.remove('visible');
  document.getElementById('studentTabs').classList.remove('visible');
  document.getElementById('codeGate').style.display = 'flex';
  document.getElementById('codeInput').value = '';
  document.getElementById('codeError').textContent = 'This class session has ended.';
  // Reset check-in state
  myCheckinState = 'idle';
  updateCheckinUI();
  // Server will force-disconnect us next — ensure we reconnect
  setTimeout(() => {
    if (!socket.connected) socket.connect();
  }, 1000);
});

// Server tells us our display name (auto-assigned if we didn't provide one)
socket.on('student-name', (name) => {
  myDisplayName = name;
  setStudentName(name);
  document.getElementById('checkinName').textContent = name;
});

// Server restores our check-in state after reconnect
socket.on('student-state-restore', (state) => {
  if (['idle', 'working', 'done'].includes(state)) {
    myCheckinState = state;
    updateCheckinUI();
  }
});

function fmt(secs) {
  const neg = secs < 0;
  const abs = Math.abs(secs);
  const h = Math.floor(abs / 3600);
  const m = Math.floor((abs % 3600) / 60);
  const s = abs % 60;
  const time = h > 0
    ? h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0')
    : String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  return time;
}

function stateClass(rem, total, running) {
  if (total === 0) return { cls: 'state-idle', paused: false };
  if (rem <= 0) return { cls: 'state-done', paused: false };
  const orangeAt = Math.min(total * 0.15, 180);  // 3 min cap
  const yellowAt = Math.min(total * 0.35, 600);  // 10 min cap
  const colorCls = rem <= orangeAt ? 'state-orange' : rem <= yellowAt ? 'state-yellow' : 'state-green';
  if (!running && rem > 0 && rem < total) return { cls: colorCls, paused: true };
  if (!running) return { cls: 'state-idle', paused: false };
  return { cls: colorCls, paused: false };
}
// Note: rem can be negative (overtime). stateClass returns 'state-done' which shows pulsing red.

function strokeColor(cls) {
  switch(cls) {
    case 'state-green':  return 'var(--green)';
    case 'state-yellow': return 'var(--yellow)';
    case 'state-orange': return 'var(--orange)';
    case 'state-done':   return 'var(--red)';
    default:             return 'rgba(255,255,255,0.15)';
  }
}

// ── Auto-size fields: shrink font to fit within max-height ──
// Uses the CSS-defined font-size as the max, scales down by percentage
const autoSizeFields = ['courseTitle', 'label', 'message'];
const autoSizeMinScale = 0.55; // won't shrink below 55% of CSS default
const autoSizeStep = 0.05;     // shrink 5% at a time

function autoSizeField(el) {
  // Reset to CSS default (remove inline override)
  el.style.fontSize = '';
  if (!el.textContent) return;
  // Get the CSS-defined font size as our maximum
  const maxPx = parseFloat(getComputedStyle(el).fontSize);
  let scale = 1.0;
  let sizePx = maxPx;
  el.style.fontSize = sizePx + 'px';
  while (el.scrollHeight > el.clientHeight + 1 && scale > autoSizeMinScale) {
    scale = Math.max(autoSizeMinScale, +(scale - autoSizeStep).toFixed(3));
    sizePx = Math.round(maxPx * scale * 100) / 100;
    el.style.fontSize = sizePx + 'px';
  }
}

function autoSizeAllFields() {
  autoSizeFields.forEach(id => {
    const el = document.getElementById(id);
    if (el) autoSizeField(el);
  });
}

window.addEventListener('resize', autoSizeAllFields);

socket.on('timer-update', (s) => {
  const digitsEl = document.getElementById('digits');
  digitsEl.textContent = fmt(s.remainingSeconds);
  const hasHours = Math.abs(s.remainingSeconds) >= 3600;
  digitsEl.classList.toggle('has-hours', hasHours);
  document.getElementById('courseTitle').textContent = s.courseTitle || '';
  document.getElementById('label').textContent = s.label || '';
  document.getElementById('message').textContent = s.message || '';
  autoSizeAllFields();

  // Update mini timer on Check In tab
  updateCheckinMiniTimer(s);

  // End time — use server-pushed label instead of hardcoded text
  const etEl = document.getElementById('endTime');
  if (s.showEndTime && s.endTime && s.running) {
    const d = new Date(s.endTime);
    let h = d.getHours();
    const m = String(d.getMinutes()).padStart(2, '0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    const prefix = s.endTimeLabel || 'Class resumes at';
    etEl.textContent = prefix + ' ' + h + ':' + m + ' ' + ampm;
  } else {
    etEl.textContent = '';
  }

  // Progress ring — use originalTotal for correct proportions after pause/restart
  // On long timers (>10 min), use a power curve (pct^0.55) so the ring drains
  // faster at the start and gradually slower toward the end. This keeps the ring
  // visible in the final minutes without any sudden pace change.
  const ring = document.getElementById('progressRing');
  const refTotal = s.originalTotal || s.totalSeconds;
  if (refTotal > 0) {
    const remaining = Math.max(0, s.remainingSeconds);
    const pct = remaining / refTotal;
    const RESCALE_THRESHOLD = 600;  // only rescale timers longer than 10 min
    const ringPct = refTotal <= RESCALE_THRESHOLD ? pct : Math.pow(pct, 0.55);
    ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - ringPct);
  } else {
    ring.style.strokeDashoffset = 0;
  }

  // Color state — use originalTotal for thresholds
  const { cls, paused } = stateClass(s.remainingSeconds, refTotal, s.running);
  document.body.className = cls;
  document.body.classList.toggle('paused', paused);
  // Display modes — only apply to display/OBS/preview, not phone students
  // OBS uses only its URL parameters; everyone else uses server flags
  if (isOBS) {
    document.body.classList.toggle('mode-transparent', urlTransparent);
    document.body.classList.toggle('mode-clock-only', urlClockOnly);
  } else {
    document.body.classList.toggle('mode-transparent', !!s.transparent);
    document.body.classList.toggle('mode-clock-only', !!s.clockOnly);
  }
  ring.style.stroke = paused ? '#444' : strokeColor(cls);

  // Status badge — only show when not running
  const badge = document.getElementById('statusBadge');
  if (s.totalSeconds === 0) badge.textContent = 'No timer set';
  else if (s.running) badge.textContent = '';
  else if (s.remainingSeconds <= 0) badge.textContent = "Time's up";
  else badge.textContent = '';
});

socket.on('timer-done', () => {
  // Vibrate on phones if supported
  if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
});

// Load QR code immediately (skip in preview mode)
if (!isPreview) {
  fetch('/qr').then(function(r) { return r.json(); }).then(function(data) {
    document.getElementById('qrImg').innerHTML = '<img src="' + data.qr + '" alt="QR code" width="150">';
    document.getElementById('qrClassCode').textContent = data.code;
    const baseUrl = data.url.replace(/\?.*$/, '');
    document.getElementById('qrHint').innerHTML = "Can't scan? Go to<br><b>" + baseUrl + "</b>";
  }).catch(function() {});
}

</script>
